<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사주 명리 · 오늘의 운세</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>사주 명리</h1>
    <p class="tag">태어난 순간의 여덟 글자, 오늘의 운을 읽다</p>
    <div class="fomo" id="fomo">오늘 무료 1회 남음</div>
    <div id="fateWindows" style="font-size:0.7rem;margin:6px 0;color:#c99"></div>
    <div id="limitedBanner" style="display:none;background:#1f1512;color:#e8b98a;padding:4px 10px;border:1px solid #7a5a3a;border-radius:999px;font-size:0.7rem;margin:6px auto;width:fit-content">🌑 흑월 운세 — 오늘 한정 (가상)</div>
  </header>

  <main>
    <section id="input">
      <h2>생년월일 입력</h2>
      <div class="form">
        <input type="date" id="birth" value="1990-01-01">
        <input type="time" id="time" value="12:00">
        <select id="gender"><option value="m">남</option><option value="f">여</option></select>
        <button onclick="generateSaju()">사주 차트 생성</button>
      </div>
    </section>

    <section id="chart" style="display:none">
      <h2>사주 팔자</h2>
      <div id="pillars" class="pillars"></div>
      <canvas id="saju-canvas" width="300" height="140" style="border:1px solid #3a3124;border-radius:4px;margin:6px 0"></canvas>
      <div id="elements"></div>
      <button onclick="doReading()" class="primary-cta">오늘의 운세 보기</button>
      <button onclick="voiceReading()" class="secondary">🎤 음성으로 듣기</button>
      <button onclick="unlockPremium()" class="secondary">프리미엄 상세 풀이</button>
    </section>

    <section id="reading" style="display:none">
      <h2>운세 결과</h2>
      <div id="readingText" class="card"></div>
      <div class="surprise" id="surprise"></div>
      <button onclick="fateShare()" class="primary-cta">🌌 운명 카드 공유하기</button>
      <div style="font-size:0.65rem;opacity:0.6;margin-top:8px">엔터테인먼트용 가상 풀이입니다 · 실제 운명 조언 아님 · 18+</div>
    </section>

    <section id="codex">
      <h2>운명의 서 — 나의 운세 기록</h2>
      <div id="codexList"></div>
      <button onclick="showCodex()" class="secondary">기록 다시 보기 (기록 강화)</button>
      <button onclick="fateShare(true)" class="secondary" style="margin-top:4px;">📤 대표 운세 이야기로 공유</button>
      <div style="font-size:0.65rem;opacity:0.55">기록을 누르면 더 선명해집니다 · 모두 가상 · 엔터테인먼트용</div>
    </section>
  </main>

  <footer>
    <small>Entertainment only. AI fictional readings. Prominent disclosure.</small>
  </footer>

  <script src="lung-surprise-eye.js"></script>
  <script src="script.js"></script>
</body>
</html>
